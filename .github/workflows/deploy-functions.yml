# Deploy automático das Cloud Functions ao dar push na branch main.
#
# Configuração única no GitHub do repositório:
#   Settings → Secrets and variables → Actions → New repository secret
#   Nome: FIREBASE_TOKEN
#   Valor: saída de `firebase login:ci` (rode na sua máquina uma vez)
#
# Opcional: restrinja a branch protegida e exija PR antes do merge.

name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Instalar dependências e build (functions)
        working-directory: functions
        run: npm ci && npm run build

      - name: Deploy functions
        run: npx --yes firebase-tools@latest deploy --only functions --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FUNCTIONS_REGION: southamerica-east1
          MULTIPLAYER_FUNCTIONS_MIN_INSTANCES: "0"
