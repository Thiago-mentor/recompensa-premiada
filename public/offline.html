<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#070712" />
    <title>Rivaliza</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; background: #070712; color: #f8fafc; }
      body { min-height: 100vh; display: grid; place-items: center; margin: 0; padding: 24px; text-align: center; }
      main { max-width: 340px; }
      .mark { width: 82px; height: 82px; border-radius: 24px; margin: 0 auto 24px; object-fit: cover; box-shadow: 0 0 34px rgba(34, 211, 238, .24); }
      h1 { margin: 0; font-size: 24px; }
      p { margin: 12px 0 0; color: #94a3b8; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main>
      <img class="mark" src="/branding/rivaliza-mark.webp" alt="Rivaliza" />
      <h1>Sem conexão</h1>
      <p>Verifique sua internet e tente abrir o Rivaliza novamente.</p>
    </main>
  </body>
</html>
