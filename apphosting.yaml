# Firebase App Hosting — backend recompensa-premiada
# Variáveis sensíveis: Console → App Hosting → Backend → Settings → Environment
# (o Console tem precedência sobre este arquivo)
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 100
  concurrency: 80

# O cliente DEVE usar a mesma região do deploy das callables (functions/src/index.ts → southamerica-east1).
# Se no App Hosting (Console) existir NEXT_PUBLIC_FIREBASE_FUNCTIONS_REGION=us-central1, o app chama o URL errado
# e aparecem 400/429 em joinAutoMatch / leaveAutoMatch.
env:
  - variable: NEXT_PUBLIC_FIREBASE_FUNCTIONS_REGION
    value: southamerica-east1
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APPCHECK_SITE_KEY
    value: 6LcFC6ksAAAAABX2Zgk-7mFBUdIrCgoOK0oLBsu1
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APPCHECK_RECAPTCHA_LEGACY_V3
    value: "false"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_USE_FIREBASE_EMULATORS
    value: "false"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_REWARDED_AD_MOCK
    value: "false"
    availability:
      - BUILD
      - RUNTIME
